<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="africaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
  </defs>
  <!-- Stylized Africa map shape combining a leaf -->
  <g transform="translate(125, 75)">
    <!-- Sun / Circle representing digital marketplace -->
    <circle cx="150" cy="120" r="90" fill="url(#AfricaGrad)" opacity="0.05" />
    <circle cx="210" cy="90" r="45" fill="url(#sunGrad)" />
    
    <!-- Stylized Africa + Leaf bud path -->
    <path d="M 120,30 
             C 170,25 210,35 230,70 
             C 245,95 240,130 220,160 
             C 200,190 190,210 180,250 
             C 175,270 160,300 150,310 
             C 145,300 135,280 135,270 
             C 135,250 145,230 145,210 
             C 145,190 110,180 90,170 
             C 70,160 60,135 60,110 
             C 60,85 80,45 120,30 Z" 
          fill="url(#africaGrad)" />
          
    <!-- Leaf vein / Digital line -->
    <path d="M 120,30 C 135,90 150,150 150,310" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.3" />
    <path d="M 135,110 C 110,105 85,115 85,115" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.25" />
    <path d="M 143,170 C 170,165 200,150 200,150" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.25" />
  </g>

  <!-- Labels -->
  <text x="250" y="410" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="52" fill="#047857" text-anchor="middle" letter-spacing="8">MANG</text>
  <text x="250" y="445" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="13" fill="#F59E0B" text-anchor="middle" letter-spacing="5">GROWING AFRICA</text>
</svg>
