<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Concept 3: The Fast Sprout Pin -->
  <g transform="translate(15, 15)">
    <!-- Motion/speed lines behind the pin (Delivery) -->
    <path d="M 20,70 L 50,70 M 15,95 L 45,95 M 25,120 L 45,120" stroke="#D4AF37" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 2" />
    
    <!-- GPS Pin Body (Market/Tech) -->
    <path d="M 100,20 
             C 140,20 170,50 170,90 
             C 170,130 110,180 100,180 
             C 90,180 30,130 30,90 
             C 30,50 60,20 100,20 Z" 
          fill="#1B5E20" />
          
    <!-- Inner Leaf/Sprout growing from point (Agriculture) -->
    <path d="M 100,130 
             C 100,130 80,100 80,80 
             C 80,60 100,50 100,50 
             C 100,50 120,60 120,80 
             C 120,100 100,130 100,130 Z" 
          fill="#D4AF37" />
          
    <!-- Center white growth bud (Tech/Digital connection) -->
    <circle cx="100" cy="80" r="6" fill="#FFFFFF" />
  </g>
</svg>
