<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Concept 2: The Agri-Tech Basket Arrow -->
  <defs>
    <linearGradient id="basketGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#D4AF37" />
    </linearGradient>
  </defs>
  <!-- Basket weaves styled as fast-forward arrows -->
  <g transform="translate(15, 20)">
    <!-- Back handle of the basket -->
    <path d="M 50,70 C 50,30 120,30 120,70" fill="none" stroke="#1B5E20" stroke-width="8" stroke-linecap="round" />
    
    <!-- Main Basket Body (Gold arrows pointing right-up) -->
    <path d="M 30,80 L 140,80 L 120,140 L 50,140 Z" fill="url(#basketGold)" />
    
    <!-- Green crop/leaf overlay lines forming the tech connections -->
    <path d="M 25,80 C 60,110 110,110 145,80" fill="none" stroke="#1B5E20" stroke-width="5" stroke-linecap="round" />
    <!-- Dynamic delivery arrows inside the basket weave -->
    <path d="M 45,100 L 75,100 L 65,115" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 85,100 L 115,100 L 105,115" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Base shadow/speed line -->
    <line x1="40" y1="155" x2="130" y2="155" stroke="#000000" stroke-width="4" stroke-linecap="round" opacity="0.15" />
    <line x1="60" y1="165" x2="110" y2="165" stroke="#1B5E20" stroke-width="3" stroke-linecap="round" opacity="0.3" />
  </g>
</svg>
