<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Concept 6: The Shield of Freshness / Bouclier Cargo -->
  <g transform="translate(15, 15)">
    <!-- Base Cargo Shield (Tech & Security) -->
    <path d="M 85,15 
             C 125,25 155,55 155,105 
             C 155,155 125,175 85,185 
             C 45,175 15,155 15,105 
             C 15,55 45,25 85,15 Z" 
          fill="#1B5E20" />
          
    <!-- Stylized gold lightning speed bolt/flash (Delivery) -->
    <polygon points="90,45 115,95 85,95 105,145 65,95 80,95" fill="#D4AF37" />
    
    <!-- Transparent leaf vein cut-outs on the green shield background -->
    <path d="M 85,25 C 90,65 95,105 95,145" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.15" />
    <path d="M 50,70 C 70,85 85,90 85,90" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.15" />
    <path d="M 120,70 C 100,85 85,90 85,90" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.15" />
    
    <!-- Outer cargo handle lines representing a woven basket rim -->
    <path d="M 35,40 C 35,40 55,25 85,25 C 115,25 135,40 135,40" fill="none" stroke="#D4AF37" stroke-width="4" stroke-linecap="round" opacity="0.3" />
  </g>
</svg>
